name: converter-xlsx

on:
  push:
    paths:
      - 'public/fabricas/**'

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar xlsx
        run: npm install xlsx

      - name: Converter XLSX → JSON
        run: node converter.js

      - name: Commit dos JSONs gerados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add public/json/*.json
          git commit -m "auto: converte XLSX → JSON [skip ci]" || echo "sem alterações"
          git push